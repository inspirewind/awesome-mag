slug: gut-phage-database
name: Gut Phage Database (GPD)
homepage: https://www.sanger.ac.uk/data/gut-phage-database/
download_page: https://ftp.ebi.ac.uk/pub/databases/metagenomics/genome_sets/gut_phage_database/
summary: Wellcome Sanger Institute human gut bacteriophage catalogue containing 142,809 non-redundant viral genome representatives from 28,060 human gut metagenomes, with nucleotide sequences, proteins, annotations, metadata, host/co-occurrence tables, and Gubaphage/crAss-like companion files.
