license: "Dataset license not separately specified on Sanger or EBI pages; Sanger data use statement and original publication terms apply"
access:
  method: public-static-files
  automation: none
  restrictions:
    - Files are public direct downloads from the EMBL-EBI FTP/HTTPS static index.
    - No checksum files were observed in the EBI directory during curation.
    - Sanger project page includes a data-use statement asking users to obtain PI permission before publishing chromosome/genome-scale analyses of sequence, ORF, or gene data.
    - This is a viral/phage genome catalogue rather than a prokaryotic MAG catalogue; keep it tagged as a human-gut companion resource.
