access:
  method: public-cnsa-ftp-manifest
  automation: none
  restrictions:
    - Public metadata and data links are exposed through the CNSA public_info directory.
    - The official manifest mixes assembly FASTA links and raw-read experiment FASTQ links; filter the first column when only MAG assemblies are needed.
    - Genome files are distributed as many individual assembly FASTA archives rather than as one bulk MAG tarball.
    - The paper reports 6,339 non-redundant MAGs, while the current CNGBdb public assembly metadata contains 6,347 assembly rows.
    - Use the official manifest and metadata TSV files rather than guessing CNSA data2 paths.
