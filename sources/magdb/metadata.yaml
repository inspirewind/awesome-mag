categories:
  - general-catalog
  - human-associated
  - environmental
  - animal-associated
biomes:
  - clinical
  - environment
  - animal
source_type:
  - database
  - dataset-portal
release: HAMG_20240130
website_version: v1.0
license: unknown
access:
  method: browser-plus-script
  automation: scripts/magdb/download.py
  restrictions:
    - Public article lists are downloadable without login.
