license: CC BY 4.0 for the article and figshare collection; CC0 for the figshare supplementary-file record
access:
  method: public-figshare-and-insdc
  automation: none
  restrictions:
    - The figshare collection is the primary whole-catalog landing page for genome sequences, but the current figshare web/API endpoints can return WAF or 403 challenges to plain curl clients.
    - The 8,466 species representatives were submitted as WGS entries under BioProject PRJDB11811 / SRA study DRP008400.
    - The 43,859 non-representative genomes were submitted as DDBJ analysis entries and are described by the article as available only through DDBJ, while also being present in figshare.
    - The Nature/Springer supplementary XLSX files are public static files and support byte-range downloads.
