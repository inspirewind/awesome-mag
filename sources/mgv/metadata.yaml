updated_at: 2021-11-03
checked_at: 2026-05-07
license: "NERSC README data usage policy says all data are freely available to use without restrictions; cite the original publication"
access:
  method: public-static-files
  automation: none
  restrictions:
    - Files are public direct downloads from the NERSC static file index.
    - No checksum files were observed in the NERSC index during curation.
    - The directory provides both a full tar.gz archive and the expanded component files.
    - This is a viral/phage genome catalogue rather than a prokaryotic MAG catalogue; keep it tagged as a human-gut companion resource.
    - The MGV GitHub README points users to UHGV as an updated version of the database.
