slug: mgv
name: Metagenomic Gut Virus Dataset (MGV)
homepage: https://portal.nersc.gov/MGV/
download_page: https://portal.nersc.gov/MGV/MGV_v1.0_2021_07_08/
summary: Lawrence Berkeley National Laboratory/JGI human gut DNA virus catalogue containing 189,680 draft uncultivated viral genomes with greater than 50% estimated completeness from 11,810 public human gut metagenomic samples, plus vOTU representatives, proteins, protein clusters, host assignments, DGRs, UHGG CRISPR spacers, and phylogeny files.
categories:
