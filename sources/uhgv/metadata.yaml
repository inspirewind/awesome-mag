license: "Zenodo data resource is CC BY 4.0; cite both the UHGV data resource and the bioRxiv publication when using the data"
access:
  method: public-static-files
  automation: none
  restrictions:
    - Files are public direct downloads from the NERSC static file index and a smaller Zenodo v1.0 record.
    - NERSC did not expose checksum files during curation; the Zenodo record provides MD5 checksums for its compact zstd subset.
    - The NERSC top-level README is partly stale and lists older 884,377 genome and 171,338 vOTU counts; the GitHub README and Zenodo v1.0 record use 873,995 genomes and 168,536 species-level vOTUs.
    - The per-vOTU representative directory is sharded across UHGV-000 through UHGV-224 folders and contains per-genome FASTA, protein, GFF, and annotation files.
    - This is a viral/phage genome catalogue rather than a prokaryotic MAG catalogue; keep it tagged as a human-gut companion resource.
