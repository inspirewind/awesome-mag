slug: uhgv
name: Unified Human Gut Virome (UHGV)
homepage: https://uhgv.jgi.doe.gov/
download_page: https://portal.nersc.gov/UHGV/
summary: Joint Genome Institute human gut virome resource integrating 12 independent gut-virus datasets into 873,995 viral genomes and 168,536 species-level vOTUs, with genome/protein FASTA files, metadata, host predictions, read-mapping tables, microdiversity calls, protein clusters, predicted structures, and companion classification/profiling tools.
