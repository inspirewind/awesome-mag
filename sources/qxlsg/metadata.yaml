access:
  method: public-ngdc-gsa-gwh-plus-node-and-figshare
  automation: implemented
  restrictions:
    - Raw metagenomic and 16S reads are public under NGDC BioProject PRJCA037687 with GSA accessions CRA025489 and CRA029668.
    - GSA HTTPS/FTP/Qtrans directories are public static indexes and include md5sum.txt checksum files.
    - GWH exposes 5,866 MAG assembly records and direct per-MAG genome FASTA URLs through an AJAX endpoint; no single public bulk MAG archive was found during curation.
    - The article lists NODE analysis OEZ00021318 and a Figshare share as MAG deposition routes; the Figshare share returned an AWS WAF challenge for command-line HEAD/GET checks during curation.
    - Treat Figshare as a browser-visible or secondary route unless the provider publishes a stable API/DOI endpoint.
