release: MRGM
updated_at: 2026-05-06
release_date: 2024-09-04
license: "Article is CC BY 4.0; MRGM webserver data license is not specified on decodebiome."
access:
  method: public-direct-http-files-via-php-file-browser
  automation: none
  restrictions:
    - No formal data API endpoint; downloads are served through a PHP-based file browser (listdir.php) returning HTML directory listings.
    - Direct directory access under data/ returns 403; use listdir.php to browse folders and direct HTTPS URLs for files.
    - The site does not publish checksum files or a Zenodo mirror for MRGM data.
    - The non-redundant genome README mentions genome.tar.gz, but the file is absent from the directory listing and the direct URL returned 404 when checked on 2026-05-06.
    - Large files include the all-genomes archive (43 GB), Kraken2 database.kraken (16 GB), Kraken2 hash.k2d (9 GB), and several multi-GB protein catalog files.
