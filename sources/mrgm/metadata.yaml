slug: mrgm
name: MRGM
homepage: https://www.decodebiome.org/MRGM/
download_page: https://www.decodebiome.org/MRGM/navigate.html
summary: Mouse Reference Gut Microbiome catalog with 42,245 non-redundant near-complete mouse gut bacterial genomes spanning 1,524 species, 55,893 total near-complete genomes, 1.7 million non-redundant proteins, predicted 16S sequences, and custom Kraken2 and MetaPhlAn databases.
