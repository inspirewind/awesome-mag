access:
  method: public-dryad-files-plus-public-ena-accessions
  automation: none
  restrictions:
    - Dryad is the simplest bulk route for the MAG contig, amino-acid, GFF, and ecozone co-assembly files.
    - The Dryad file set is approximately 64.3 GB; download individual files with resume support and verify SHA-256 checksums.
    - ENA PRJEB62834 carries MAG and assembly accession records; during curation, ENA reported 1,008 assembly records and 1,019 analysis records for this study.
    - ENA PRJEB29238 carries the raw metagenome reads listed in the article data availability statement; during curation, ENA reported 368 read-run records.
    - JGI GOLD records are article-reported co-assembly annotation accessions; the study URL returned a generic GOLD error page during curation, so prefer Dryad and ENA for reproducible access.
