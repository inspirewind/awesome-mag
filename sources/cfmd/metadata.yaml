slug: cfmd
name: cFMD
homepage: https://github.com/SegataLab/cFMD
download_page: https://github.com/SegataLab/cFMD#data
summary: curatedFoodMetagenomicData, a public food shotgun metagenome resource with curated sample metadata, taxonomic and functional profiles, and reconstructed food-associated MAGs.
