release: cFMD v1.3.1
release_date: 2026-02-02
updated_at: 2026-02-02
checked_at: 2026-05-09
license: CC BY 4.0
access:
  method: public-github-files-plus-zenodo-archives
  automation: upstream-download-scripts
  restrictions:
    - GitHub hosts cFMD-level TSV files and per-dataset folders for metadata, MAG info tables, and taxonomic profiles.
    - MAG FASTA archives are hosted externally on Zenodo and are downloaded dataset-by-dataset through the upstream `download_mags.sh` script.
    - Functional profiles are hosted externally on Zenodo and are downloaded dataset-by-dataset through the upstream `download_functional_profiles.sh` script.
    - The upstream scripts use `wget`, extract tarballs locally, and remove the downloaded archive after extraction.
    - Current cFMD v1.3.1 counts differ from the Cell 2024 paper release; use the GitHub README/release for current counts and the paper/Zenodo v1.1.0 records for publication-era counts.
