slug: metavr
name: Meta-virus Resource (MetaVR)
homepage: https://www.meta-virome.org/
download_page: https://www.meta-virome.org/Downloads
summary: DOE JGI and BSRC Fleming multi-biome successor to IMG/VR, containing 24,435,662 uncultivated virus genomes organized into 12,705,385 vOTUs, with browser-visible portal/API documentation, nucleotide/protein download listings, UViG metadata, host predictions, protein-cluster alignments, AlphaFold3 protein models, and source dataset metadata.
