access:
  method: public-web-portal-with-cloudflare-protected-api-and-downloads
  automation: blocked-for-plain-cli-api-and-bulk-downloads
  restrictions:
    - Bulk files are listed on the public MetaVR Downloads page and do not require login in the browser, but non-browser CLI downloads are not currently reproducible.
    - The API documentation is browser-visible, but curation-time plain `curl` requests to documented API endpoints returned Cloudflare challenge HTML rather than JSON.
    - The site is Cloudflare-protected; curation-time CLI HEAD checks returned a Cloudflare challenge, so content-length and last-modified headers were not captured.
    - A user-tested `wget -c https://www.meta-virome.org/Data/Downloads/IMGVR5_UViG.fna.gz` request returned `403 Forbidden` on 2026-05-08.
    - Do not treat the listed bulk URLs as wget/curl-ready direct downloads unless the provider changes the Cloudflare policy or publishes an official mirror.
    - The Downloads page did not list checksum files during curation.
    - Bulk files are large, with the main UViG FASTA around 77 GB and the protein FASTA around 48.7 GB compressed.
    - The Protein Cluster MSA asset is listed on the Downloads page, but a curation fetch of the static URL returned 404 on 2026-05-08; verify interactively before scheduling that transfer.
    - The catalogue includes both high-confidence and low-confidence UViGs; low-confidence entries have higher expected false-positive risk.
    - This is a viral genome and virome catalogue rather than a prokaryotic MAG catalogue; keep it tagged as a companion resource.
download:
  landing_page: https://www.meta-virome.org/Downloads
  api_docs: https://meta-virome.org/api/docs
  core_files:
    uvig_genomes:
      url: https://www.meta-virome.org/Data/Downloads/IMGVR5_UViG.fna.gz
      file: IMGVR5_UViG.fna.gz
      size_human: "~77G"
      records: 24435662
      description: Gzip-compressed nucleotide FASTA for all MetaVR UViGs.
    uvig_metadata:
      url: https://www.meta-virome.org/DownloadUvigMetadata
      file: IMGVR5_UViG.tsv.gz
      size_human: "~846M"
      rows: 24435662
      description: Gzip-compressed UViG metadata table with sample, quality, taxonomy, host, biome, and source fields.
    uvig_proteins:
      url: https://www.meta-virome.org/Data/Downloads/IMGVR5_UViG.faa.gz
      file: IMGVR5_UViG.faa.gz
      size_human: "~48.7G"
      description: Gzip-compressed FASTA of predicted proteins for MetaVR UViGs.
    protein_cluster_msas:
      url: https://www.meta-virome.org/Data/Downloads/IMGVR5_PC_MSAs.tar.zst
      file: IMGVR5_PC_MSAs.tar.zst
      size_human: "~13.8G"
      description: Zstandard-compressed tar archive of representative protein-cluster multiple sequence alignments for clusters with at least 100 members.
      caveat: Static URL returned 404 during curation on 2026-05-08 despite being listed on the Downloads page.
    protein_cluster_3d_models:
      url: https://www.meta-virome.org/Data/Downloads/IMGVR5_PC_3Dmodels.tar.gz
      file: IMGVR5_PC_3Dmodels.tar.gz
      size_human: "~29.6G"
      description: Gzip-compressed tar archive of AlphaFold3-predicted 3D protein structures for representative protein clusters with at least 100 members.
    iphop_host_predictions:
      url: https://www.meta-virome.org/DownloadiPHop
      file: MetaVR_iPHoP_results.tsv.gz
      size_human: "~921M"
      description: Gzip-compressed iPHoP host-classification table for MetaVR UViGs.
    source_dataset_metadata:
      url: https://www.meta-virome.org/DownloadSDM
      file: Source_dataset_metadata.tsv.gz
      size_human: "~22M"
      rows: 162534
      description: Gzip-compressed metadata table for source metagenomes, metatranscriptomes, isolate genomes, SAGs, MAGs, and RefSeq genomes used by MetaVR.
