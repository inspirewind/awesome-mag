source_type:
  - dataset
  - dataset-portal
release: HRGM2
updated_at: 2026-04-13
release_date: 2025-12-04
license: "CC0-1.0 for HRGM2 Zenodo data; CC BY 4.0 for the HRGM1 publication and third-party gapseq models"
access:
  method: public-direct-http-bulk-archives
  automation: none
  restrictions:
    - No formal data API endpoint; downloads are served through a PHP-based file browser (listdir.php) returning HTML directory listings.
    - Individual genome FASTA files use 3-4 level deep directory nesting; use the download_link_info.tsv index files to enumerate URLs.
    - The decodebiome server does not publish checksum files; Zenodo HRGM2 records provide MD5 checksums for mirrored data.
    - "Several bulk archives exceed 100 GB (Nonredundant: 114 GB, Redundant: 179 GB, Pangenomes: 395 GB); plan download time and disk accordingly."
    - The old URL cited in the publication (www.mbiomenet.org/HRGM/) is unreachable; data has migrated to decodebiome.org.
