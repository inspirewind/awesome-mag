slug: hrgm
name: HRGM
homepage: https://www.decodebiome.org/HRGM/
download_page: https://www.decodebiome.org/HRGM/navigate.html
summary: Human Reference Gut Microbiome catalog with 155,211 non-redundant near-complete genomes (HRGM2) spanning 4,824 prokaryotic species across 41 countries, plus proteins, SNVs, pangenomes, GEMs, CAZymes, defense systems, and taxonomy profiling databases.
categories:
