summary: Genome Resolved Open Watersheds database (GROWdb), a crowdsourced North American river surface-water multi-omics resource covering 90% of US watersheds, with 3,825 recovered MAGs dereplicated to 2,093 MAGs and companion annotations, gene sequences, expression tables, ARG calls, and global freshwater comparison MAG files.
