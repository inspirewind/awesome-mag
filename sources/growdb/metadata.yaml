access:
  method: public-ncbi-bioproject-plus-zenodo-files-plus-interactive-portals
  automation: none
  restrictions:
    - The article data availability statement lists all reads and MAGs under NCBI BioProject PRJNA946291.
    - The Zenodo concept DOI has multiple versions; core GROWdb annotation, gene, expression, ARG, and tree files are in record 8173287, while latest record 11193259 only exposes the global freshwater MAG comparison archive and inventory.
    - NMDC, KBase, and GROWdb Explorer are useful interactive/search interfaces, but Zenodo and NCBI are the reproducible bulk-download routes.
    - KBase is a public collection, but some analysis and workspace reuse actions may require a KBase account.
