slug: omdb
name: OMDB
homepage: https://omdb.microbiomics.io/about
download_page: https://omdb.microbiomics.io/repository/ocean/suppl_info
summary: Ocean Microbiomics DataBase v2.0, a Sunagawa Lab ocean microbiome genome-resolved database with 274,282 reconstructed genomes, gene and scaffold catalogs, per-genome annotation links, and a browser interface for studies, samples, taxonomy, and genomes.
categories:
  - marine
