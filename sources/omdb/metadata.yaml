release: OMDB v2.0
release_date: 2025-05-25
updated_at: 2025-05-25
checked_at: 2026-05-09
license: CC BY 4.0
access:
  method: public-browser-plus-direct-static-files
  automation: none
  restrictions:
    - The graphical interface is best for inspecting individual genomes, studies, samples, taxonomy, and annotations.
    - Bulk access is public through the Sunagawa Lab static file backend and an OMDBv2.0 links TSV.
    - The links TSV is small enough to use as a reproducible download manifest; it has one row per genome and columns for genome FASTA, nucleotide genes, amino-acid genes, GFF, and antiSMASH tarball links.
    - Whole-database sequence archives and catalogs are very large, including a 1.5 TB genome database archive and catalog sequence files up to 150 GB.
    - The catalog root lists an OMDBv2.0_data.tsv.gz.md5 file, but direct GET returned HTTP 403 during curation; the download documentation reports MD5 c1b5f14c9b7899f7300ccf41e62f8681 for the links TSV.
