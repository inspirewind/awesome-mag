slug: smag
name: SMAG
homepage: https://microbma.github.io/project/SMAG.html
download_page: https://zenodo.org/records/8223844
summary: Global Soil MAGs Project catalog reconstructed from 3,304 soil metagenomes, with 40,039 MAG bins, 21,077 species-level genome bins, SNV data, and virus sequences.
