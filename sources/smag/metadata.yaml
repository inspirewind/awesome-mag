    s3_virus_sequences: https://bma-smag.s3.cn-northwest-1.amazonaws.com.cn/SMAG/magvirus.fa
  notes:
    - Prefer Zenodo for reproducible downloads and metadata because it exposes checksums and file metadata.
    - Reassemble the split MAG archive after downloading all `mag.tar.gz.*` parts.
    - Record mirror behavior before relying on CyVerse or S3 links for automation.
