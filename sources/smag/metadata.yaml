  mirrors:
    cyverse_dereplicated_mags: https://data.cyverse.org/dav-anon/iplant/home/lucyzju/Caiyu_SMAG_catalog_2023/MAGdrep.tar.gz
    cyverse_all_mags: https://data.cyverse.org/dav-anon/iplant/home/lucyzju/Caiyu_SMAG_catalog_2023/MAG.tar.gz
    s3_all_mags: https://bma-smag.s3.cn-northwest-1.amazonaws.com.cn/SMAG/MAG40039.tar.gz
    s3_dereplicated_mags: https://bma-smag.s3.cn-northwest-1.amazonaws.com.cn/SMAG/magdrep.tar.gz
