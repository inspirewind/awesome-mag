  mode: public static indexes and direct files
notes:
  - The JGI project page identifies GEM as a catalogue of 52,515 MAGs from over 10,450 metagenomes.
  - MAGs meet at least medium-quality MIMAG criteria; the JGI page reports mean completeness of 83%, mean contamination of 1.3%, and 9,143 high-quality MAGs.
  - NERSC hosts the reproducible public data root, including genome FASTA, CDS nucleotide and protein tar files, metadata, OTU tables, antiSMASH BGC files, VirSorter prophage calls, MMseqs2 protein clusters, and marker-gene trees.
  - The Genome Portal page displayed an end-of-life notice on 2026-04-27; keep the NERSC data root as the primary download reference.
