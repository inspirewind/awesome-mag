slug: hrom
name: HROM
homepage: https://www.decodebiome.org/HROM/
download_page: https://www.decodebiome.org/HROM/navigate.html
summary: Human Reference Oral Microbiome catalog with 72,641 high-quality oral microbial genomes from 3,426 species, 8,492,076 non-redundant proteins, species pangenomes, 16S rRNA sequences, and custom Kraken2 and MetaPhlAn4 databases.
categories:
  - human-associated
  - metagenome-assembled-genomes
  - dataset-portal
biomes:
  - human-associated
  - oral
source_type:
  - dataset
  - dataset-portal
release: HROM
updated_at: 2026-03-08
release_date: 2025-11-12
license: "Not specified for HROM webserver data; article access/license handled by Cell Host & Microbe/Elsevier"
access:
  method: public-direct-http-bulk-archives
  automation: none
  restrictions:
    - No formal data API endpoint; downloads are served through a PHP-based file browser (listdir.php) returning HTML directory listings.
    - Direct directory access under data/ returns 403; use listdir.php to browse folders and direct HTTPS URLs for files.
    - The site does not publish checksum files or a Zenodo mirror for HROM data.
    - Representative genomes and pangenomes are stored as many individual files under nested or per-species directories; use the metadata table and listdir.php paths rather than guessing every URL.
    - The HROM homepage citation still says the manuscript is in preparation, but the matching Cell Host & Microbe article is already published online.
