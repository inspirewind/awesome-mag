  automation: none
  restrictions:
    - CNCB-NGDC catalog files are public static HTTPS downloads with byte-range support.
    - The static catalog directories do not expose MD5 or SHA checksums; use resumable downloads and preserve upstream file sizes for integrity checks.
    - Several TPMC gene catalog assets are very large plain text FASTA or TSV files rather than compressed archives.
    - Raw metagenomes are deposited in GSA accession CRA011511; the project page states that underlying metagenomes are protected by GSA data release and utilization policies and encourages contact for overlapping analyses or publications.
