access:
  method: public-gsa-raw-reads-plus-public-supplementary-files
  automation: none
  restrictions:
    - GSA project CRA007205 provides public paired FASTQ files for 30 runs, with HTTPS, FTP, Qtrans, and Aspera routes plus a public md5sum file.
    - The GSA page reports 60 sequence files totaling 1218.75 GB.
    - The public GSA download directory contains raw reads only; no public GWH assembly records are linked from BioProject PRJCA008889 during curation.
    - ScienceDirect exposes direct supplement downloads for two XLSX workbooks and one PDF; the original ASM article page was Cloudflare-challenged from command-line access during curation.
    - The article reports 5,046 MAGs, but a stable public bulk MAG FASTA/protein archive was not found in GSA, GWH, OMIX, or the GitHub repository during curation; use the supplement workbooks for MAG metadata and contact the authors if genome sequences are required.
